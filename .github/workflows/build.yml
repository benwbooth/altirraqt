name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # release job creates / updates GH releases

jobs:

  # -----------------------------------------------------------------------
  # Build the AltirraOS / Altirra BASIC ROMs once on Linux (via the Nix
  # flake → MADS → fpc) and share them with the Windows / macOS jobs as an
  # artifact. Those runners have neither MADS nor Free Pascal preinstalled,
  # and the project's CMake honours PREBUILT_KERNEL_ROMS_DIR to skip the
  # ROM toolchain entirely.
  # -----------------------------------------------------------------------
  prebuild-roms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build ROMs
        run: tools/build-roms.sh
      - name: Stage ROMs flat
        run: |
          mkdir -p prebuilt-roms
          for r in kernel.rom kernelxl.rom kernel816.rom nokernel.rom \
                   superkernel.rom nocartridge.rom nohdbios.rom nogame.rom \
                   nomio.rom noblackbox.rom; do
            cp "build/src/Kernel/$r" prebuilt-roms/
          done
          cp build/src/ATBasic/atbasic.bin prebuilt-roms/
          ls -la prebuilt-roms/
      - uses: actions/upload-artifact@v4
        with:
          name: prebuilt-roms
          path: prebuilt-roms/
          retention-days: 7

  # -----------------------------------------------------------------------
  # Linux: AppImage (via nix-appimage) + Flatpak (via flatpak-builder).
  # -----------------------------------------------------------------------
  linux:
    needs: prebuild-roms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install flatpak / flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
      - name: Build AppImage + Flatpak
        run: tools/release.sh
      - name: Inventory
        run: ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: dist/*

  # -----------------------------------------------------------------------
  # macOS: matrix of Intel + Apple Silicon. Produces a self-contained .app
  # zipped with macdeployqt'd Qt frameworks.
  # -----------------------------------------------------------------------
  macos:
    needs: prebuild-roms
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: prebuilt-roms
          path: prebuilt-roms/
      - name: Install ninja
        run: brew install ninja
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtmultimedia'
          cache: true
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPREBUILT_KERNEL_ROMS_DIR="$PWD/prebuilt-roms"
      - name: Build
        run: cmake --build build -j
      - name: Bundle (macdeployqt)
        run: |
          APP="build/src/altirraqt/altirraqt.app"
          if [ ! -d "$APP" ]; then
            echo "expected $APP, got:"
            find build/src/altirraqt -maxdepth 2
            exit 1
          fi
          macdeployqt "$APP"
          ditto -c -k --keepParent "$APP" "altirraqt-macos-${{ matrix.arch }}.zip"
          ls -lh "altirraqt-macos-${{ matrix.arch }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: altirraqt-macos-${{ matrix.arch }}.zip

  # -----------------------------------------------------------------------
  # Windows: MSVC + Qt6 + windeployqt. Produces a zip of altirraqt.exe with
  # all Qt DLLs and platform plugins alongside.
  # -----------------------------------------------------------------------
  windows:
    needs: prebuild-roms
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: prebuilt-roms
          path: prebuilt-roms/
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtmultimedia'
          arch: 'win64_msvc2019_64'
          cache: true
      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPREBUILT_KERNEL_ROMS_DIR="$PWD/prebuilt-roms"
      - name: Build
        shell: bash
        run: cmake --build build -j
      - name: Bundle (windeployqt)
        shell: bash
        run: |
          mkdir -p dist/altirraqt
          cp build/src/altirraqt/altirraqt.exe dist/altirraqt/
          windeployqt --release --no-translations --no-system-d3d-compiler \
                      --no-opengl-sw dist/altirraqt/altirraqt.exe
          7z a altirraqt-windows-x86_64.zip ./dist/altirraqt
          ls -lh altirraqt-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: altirraqt-windows-x86_64.zip

  # -----------------------------------------------------------------------
  # On v* tag pushes, attach all platform artifacts to the GH release.
  # If the tag's release already exists, files are uploaded with --clobber.
  # -----------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \
               \( -name '*.AppImage' -o -name '*.flatpak' \
                  -o -name '*.zip' \) \
               -exec cp {} release-files/ \;
          ls -lh release-files/
      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-files/* --clobber
          else
            gh release create "$TAG" release-files/* \
              --title "altirraqt $TAG" \
              --generate-notes
          fi
