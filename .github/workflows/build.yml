name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # release job creates / updates GH releases

jobs:

  # -----------------------------------------------------------------------
  # Build the AltirraOS / Altirra BASIC ROMs once on Linux (via the Nix
  # flake → MADS → fpc) and share them with the Windows / macOS jobs as an
  # artifact. Those runners have neither MADS nor Free Pascal preinstalled,
  # and the project's CMake honours PREBUILT_KERNEL_ROMS_DIR to skip the
  # ROM toolchain entirely.
  # -----------------------------------------------------------------------
  prebuild-roms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build ROMs
        run: tools/build-roms.sh
      - name: Stage ROMs flat
        run: |
          mkdir -p prebuilt-roms
          for r in kernel.rom kernelxl.rom kernel816.rom nokernel.rom \
                   superkernel.rom nocartridge.rom nohdbios.rom nogame.rom \
                   nomio.rom noblackbox.rom; do
            cp "build/src/Kernel/$r" prebuilt-roms/
          done
          cp build/src/ATBasic/atbasic.bin prebuilt-roms/
          ls -la prebuilt-roms/
      - uses: actions/upload-artifact@v4
        with:
          name: prebuilt-roms
          path: prebuilt-roms/
          retention-days: 7

  # -----------------------------------------------------------------------
  # Linux: AppImage (via nix-appimage) + Flatpak (via flatpak-builder).
  # -----------------------------------------------------------------------
  linux:
    needs: prebuild-roms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install flatpak / flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
      - name: Build AppImage + Flatpak
        run: tools/release.sh
      - name: Inventory
        run: ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: dist/*

  # -----------------------------------------------------------------------
  # macOS: matrix of Intel + Apple Silicon. Produces a self-contained .app
  # zipped with macdeployqt'd Qt frameworks.
  # -----------------------------------------------------------------------
  macos:
    needs: prebuild-roms
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 = Apple Silicon. Intel macOS (macos-13) was dropped from
          # the matrix because GHA's macos-13 hosted-runner queue is routinely
          # backed up; the same code path compiles on x86_64 macOS too (no
          # arm64-only sources, the SSE2 fast paths kick in instead of NEON)
          # so reinstating it is a one-line matrix add when CI capacity comes
          # back.
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: prebuilt-roms
          path: prebuilt-roms/
      - name: Install ninja
        run: brew install ninja
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtmultimedia'
          cache: true
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPREBUILT_KERNEL_ROMS_DIR="$PWD/prebuilt-roms"
      - name: Build
        run: cmake --build build -j
      - name: Bundle (macdeployqt)
        run: |
          APP="build/src/altirraqt/altirraqt.app"
          if [ ! -d "$APP" ]; then
            echo "expected $APP, got:"
            find build/src/altirraqt -maxdepth 2
            exit 1
          fi
          macdeployqt "$APP"
          ditto -c -k --keepParent "$APP" "altirraqt-macos-${{ matrix.arch }}.zip"
          ls -lh "altirraqt-macos-${{ matrix.arch }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: altirraqt-macos-${{ matrix.arch }}.zip

  # -----------------------------------------------------------------------
  # Windows: deferred. Native Altirra (the upstream this is a Qt port of)
  # already ships a polished Win32 build at virtualdub.org/altirra.html, so
  # a Qt port on Windows duplicates work for little user benefit. The Qt
  # port also assumes a POSIX system library (src/system/source/thread.cpp,
  # memory.cpp, process.cpp, filesys.cpp depend on pthread/sys/syscall/
  # unistd) that MSVC doesn't provide. Re-porting those to Win32 is several
  # days of careful work; not gated on this CI rollout. Drop in a windows
  # job here when/if that port lands.
  # -----------------------------------------------------------------------

  # -----------------------------------------------------------------------
  # On v* tag pushes, attach all platform artifacts to the GH release.
  # If the tag's release already exists, files are uploaded with --clobber.
  # -----------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \
               \( -name '*.AppImage' -o -name '*.flatpak' \
                  -o -name '*.zip' \) \
               -exec cp {} release-files/ \;
          ls -lh release-files/
      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-files/* --clobber
          else
            gh release create "$TAG" release-files/* \
              --title "altirraqt $TAG" \
              --generate-notes
          fi
