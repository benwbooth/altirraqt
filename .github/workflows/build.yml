name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # release job creates / updates GH releases + pushes gh-pages

jobs:

  # -----------------------------------------------------------------------
  # Build the AltirraOS / Altirra BASIC ROMs once on Linux (via the Nix
  # flake → MADS → fpc) and share them with the Windows / macOS jobs as an
  # artifact. Those runners have neither MADS nor Free Pascal preinstalled,
  # and the project's CMake honours PREBUILT_KERNEL_ROMS_DIR to skip the
  # ROM toolchain entirely.
  # -----------------------------------------------------------------------
  prebuild-roms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build ROMs
        run: tools/build-roms.sh
      - name: Stage ROMs flat
        run: |
          mkdir -p prebuilt-roms
          for r in kernel.rom kernelxl.rom kernel816.rom nokernel.rom \
                   superkernel.rom nocartridge.rom nohdbios.rom nogame.rom \
                   nomio.rom noblackbox.rom; do
            cp "build/src/Kernel/$r" prebuilt-roms/
          done
          cp build/src/ATBasic/atbasic.bin prebuilt-roms/
          ls -la prebuilt-roms/
      - uses: actions/upload-artifact@v4
        with:
          name: prebuilt-roms
          path: prebuilt-roms/
          retention-days: 7

  # -----------------------------------------------------------------------
  # AppImage (linuxdeploy + plugin-qt; ~100 MB).
  # -----------------------------------------------------------------------
  appimage:
    needs: prebuild-roms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: prebuilt-roms
          path: prebuilt-roms/
      - name: Install build deps (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake ninja-build pkg-config \
            zlib1g-dev libgl-dev libegl-dev libxkbcommon-dev \
            wget file libfuse2t64
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtmultimedia'
          cache: true
      - name: Build AppImage
        env:
          # The codebase has Clang-specific inline asm (vdasm_uint128_*);
          # GCC rejects it.
          CC: clang
          CXX: clang++
          PREBUILT_KERNEL_ROMS_DIR: ${{ github.workspace }}/prebuilt-roms
        run: tools/build-appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  # -----------------------------------------------------------------------
  # Flatpak (KDE Platform 6.10 runtime; ~2 MB bundle). Also exports the
  # OSTree repo so the `pages` job can publish it as a Flatpak remote on
  # tag pushes.
  # -----------------------------------------------------------------------
  flatpak:
    needs: prebuild-roms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: prebuilt-roms
          path: prebuilt-roms/
      - name: Install flatpak / flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
      - name: Build Flatpak
        env:
          PREBUILT_KERNEL_ROMS_DIR: ${{ github.workspace }}/prebuilt-roms
        run: tools/build-flatpak.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak-bundle
          path: dist/*.flatpak
      - name: Pack OSTree repo
        run: |
          tar -C build-flatpak -cf flatpak-repo.tar repo
          ls -lh flatpak-repo.tar
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: flatpak-repo.tar

  # -----------------------------------------------------------------------
  # macOS: matrix of Intel + Apple Silicon. Produces a self-contained .app
  # zipped with macdeployqt'd Qt frameworks.
  # -----------------------------------------------------------------------
  macos:
    needs: prebuild-roms
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 = Apple Silicon. Intel macOS (macos-13) was dropped from
          # the matrix because GHA's macos-13 hosted-runner queue is routinely
          # backed up; the same code path compiles on x86_64 macOS too (no
          # arm64-only sources, the SSE2 fast paths kick in instead of NEON)
          # so reinstating it is a one-line matrix add when CI capacity comes
          # back.
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: prebuilt-roms
          path: prebuilt-roms/
      - name: Install ninja
        run: brew install ninja
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtmultimedia'
          cache: true
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPREBUILT_KERNEL_ROMS_DIR="$PWD/prebuilt-roms"
      - name: Build
        run: cmake --build build -j
      - name: Bundle (macdeployqt + hdiutil → DMG)
        run: |
          APP="build/src/altirraqt/altirraqt.app"
          if [ ! -d "$APP" ]; then
            echo "expected $APP, got:"
            find build/src/altirraqt -maxdepth 2
            exit 1
          fi
          macdeployqt "$APP"
          DMG="altirraqt-macos-${{ matrix.arch }}.dmg"
          hdiutil create -volname altirraqt -srcfolder "$APP" \
                         -format UDZO -ov "$DMG"
          ls -lh "$DMG"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: altirraqt-macos-${{ matrix.arch }}.dmg

  # -----------------------------------------------------------------------
  # Windows via MSYS2 / MinGW-w64 / Clang. Avoids MSVC entirely because the
  # Qt port's system library (thread.cpp, memory.cpp, file.cpp, …) assumes
  # POSIX headers — pthread, unistd, sys/syscall — which MinGW supplies via
  # winpthreads but MSVC does not. Clang also accepts both POSIX dialect
  # and the few MSVC intrinsics already shimmed for the macOS build.
  # -----------------------------------------------------------------------
  windows:
    needs: prebuild-roms
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: prebuilt-roms
          path: prebuilt-roms/
      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            git
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-nsis
            mingw-w64-clang-x86_64-qt6-base
            mingw-w64-clang-x86_64-qt6-multimedia
            mingw-w64-clang-x86_64-qt6-tools
            mingw-w64-clang-x86_64-zlib
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DPREBUILT_KERNEL_ROMS_DIR="$(pwd)/prebuilt-roms"
      - name: Build
        run: cmake --build build -j
      - name: Bundle (windeployqt → NSIS installer)
        run: |
          mkdir -p dist/altirraqt
          cp build/src/altirraqt/altirraqt.exe dist/altirraqt/
          # The CLANG64 Qt6 package names the deploy tool 'windeployqt6'
          # (some older builds: 'windeployqt-qt6'); try both.
          if command -v windeployqt6 >/dev/null;     then DEPLOY=windeployqt6
          elif command -v windeployqt-qt6 >/dev/null; then DEPLOY=windeployqt-qt6
          else                                          DEPLOY=windeployqt
          fi
          "$DEPLOY" --release --no-translations --no-system-d3d-compiler \
                    --no-opengl-sw dist/altirraqt/altirraqt.exe
          # MinGW + Clang runtime DLLs the binary loads.
          for dll in libc++.dll libunwind.dll libwinpthread-1.dll \
                     zlib1.dll libssp-0.dll; do
            f="/clang64/bin/$dll"
            [ -f "$f" ] && cp "$f" dist/altirraqt/ || true
          done
          # Build the installer.
          VERSION=$(git describe --tags --always 2>/dev/null || echo dev)
          OUT="altirraqt-${VERSION}-windows-x86_64-installer.exe"
          makensis -DSRCDIR=dist/altirraqt \
                   -DOUTFILE="$OUT" \
                   -DAPPVERSION="$VERSION" \
                   packaging/windows/altirraqt.nsi
          ls -lh "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: altirraqt-*-windows-x86_64-installer.exe

  # -----------------------------------------------------------------------
  # On v* tag pushes, publish the Flatpak OSTree repo to GitHub Pages so
  # users can `flatpak --user remote-add --no-gpg-verify altirraqt
  # https://<user>.github.io/altirraqt/altirraqt.flatpakrepo` and get
  # auto-updates from `flatpak update`.
  # -----------------------------------------------------------------------
  pages:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: flatpak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: flatpak-repo
          path: .
      - name: Stage gh-pages content
        run: |
          set -e
          mkdir -p pages-out
          tar -C pages-out -xf flatpak-repo.tar
          REPO_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/altirraqt"
          # .flatpakrepo: machine-readable description for `flatpak remote-add`.
          {
            echo "[Flatpak Repo]"
            echo "Title=altirraqt"
            echo "Url=$REPO_URL/repo/"
            echo "Homepage=https://github.com/${GITHUB_REPOSITORY}"
            echo "Description=Qt port of Altirra (Atari 8-bit). Self-published; add with --no-gpg-verify."
            echo "NoDeps=false"
          } > pages-out/altirraqt.flatpakrepo
          # index.html: human-readable landing page.
          python3 - "$REPO_URL" "$GITHUB_REPOSITORY" > pages-out/index.html <<'PY'
          import sys
          repo_url, gh_repo = sys.argv[1], sys.argv[2]
          print(f"""<!doctype html>
          <html lang="en"><head><meta charset="utf-8">
          <title>altirraqt — Flatpak repo</title>
          <style>
            body {{ font-family: system-ui, sans-serif; max-width: 720px; margin: 3em auto; padding: 0 1em; line-height: 1.5; }}
            code, pre {{ font-family: ui-monospace, monospace; background: #f4f4f4; padding: .2em .4em; border-radius: 3px; }}
            pre {{ padding: .8em 1em; overflow-x: auto; white-space: pre; }}
            h1, h2 {{ margin-top: 1.5em; }}
          </style></head><body>
          <h1>altirraqt — Flatpak repo</h1>
          <p>Qt port of <a href="https://www.virtualdub.org/altirra.html">Altirra</a> (Atari 8-bit emulator).
             Source on <a href="https://github.com/{gh_repo}">GitHub</a>.</p>
          <h2>Install</h2>
          <pre>flatpak --user remote-add --no-gpg-verify altirraqt \\
              {repo_url}/altirraqt.flatpakrepo
          flatpak --user install altirraqt com.virtualdub.altirraqt</pre>
          <p>Update later with <code>flatpak --user update com.virtualdub.altirraqt</code>.</p>
          <h2>Other downloads</h2>
          <p>AppImage and Windows / macOS binaries: <a href="https://github.com/{gh_repo}/releases/latest">latest GitHub release</a>.</p>
          </body></html>""")
          PY
          rm -f pages-out/flatpak-repo.tar
          ls -lR pages-out | head -40
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-out
          force_orphan: true

  # -----------------------------------------------------------------------
  # On v* tag pushes, attach all platform artifacts to the GH release.
  # If the tag's release already exists, files are uploaded with --clobber.
  # -----------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [appimage, flatpak, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \
               \( -name '*.AppImage' -o -name '*.flatpak' \
                  -o -name '*.dmg' -o -name '*.exe' \) \
               -exec cp {} release-files/ \;
          ls -lh release-files/
      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-files/* --clobber
          else
            gh release create "$TAG" release-files/* \
              --title "altirraqt $TAG" \
              --generate-notes
          fi
