app-id: com.virtualdub.altirraqt
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: altirraqt

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network                    # Help → Check for Updates, modem device
  - --filesystem=host:ro               # mount host disk/cassette/cart files read-only
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  # Persistent QSettings storage:
  - --persist=.config

# Build with Clang from the LLVM extension; the codebase relies on Clang
# inline-asm intrinsics (vdasm_uint128_*) that GCC 13/14 doesn't accept.
build-options:
  append-path: /usr/lib/sdk/llvm20/bin
  prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
  env:
    CC: clang
    CXX: clang++

modules:
  - name: altirraqt
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      # The Atari kernel + BASIC ROMs are built on the host with MADS
      # (Free Pascal, not in the SDK) and shipped as `prebuilt-roms/`.
      # tools/build-flatpak.sh stages them before invoking
      # flatpak-builder.
      - -DPREBUILT_KERNEL_ROMS_DIR=/run/build/altirraqt/packaging/flatpak/prebuilt-roms
    sources:
      - type: dir
        path: ../..
    post-install:
      # Flatpak only exports files whose basename is prefixed with the
      # app-id, so rename the .desktop, icon, and (rewrite the desktop's
      # Icon= line accordingly).
      - mv /app/share/applications/altirraqt.desktop
           /app/share/applications/com.virtualdub.altirraqt.desktop
      - sed -i 's/^Icon=altirraqt$/Icon=com.virtualdub.altirraqt/'
            /app/share/applications/com.virtualdub.altirraqt.desktop
      - mv /app/share/icons/hicolor/256x256/apps/altirraqt.png
           /app/share/icons/hicolor/256x256/apps/com.virtualdub.altirraqt.png
    cleanup:
      - /include
      - /lib/cmake
      - /lib/pkgconfig
      - '*.la'
      - '*.a'

# Build with:
#   tools/build-flatpak.sh
# That script pre-builds the ROMs into packaging/flatpak/prebuilt-roms/
# and then runs flatpak-builder.
