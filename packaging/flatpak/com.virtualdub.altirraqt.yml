app-id: com.virtualdub.altirraqt
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: altirraqt

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network                    # Help → Check for Updates, modem device
  - --filesystem=host:ro               # mount host disk/cassette/cart files read-only
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  # Persistent QSettings storage:
  - --persist=.config

modules:
  - name: altirraqt
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ../..
    cleanup:
      - /include
      - /lib/cmake
      - /lib/pkgconfig
      - '*.la'
      - '*.a'

# Build with:
#   flatpak-builder --force-clean build-flatpak \
#       packaging/flatpak/com.virtualdub.altirraqt.yml
# Bundle into a single-file repo + .flatpak with:
#   flatpak-builder --repo=dist/flatpak-repo --force-clean build-flatpak \
#       packaging/flatpak/com.virtualdub.altirraqt.yml
#   flatpak build-bundle dist/flatpak-repo \
#       dist/altirraqt.flatpak com.virtualdub.altirraqt
